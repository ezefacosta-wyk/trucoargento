<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sala online — Truco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --celeste:#74ACDF; --blanco:#FBF9F4; --sol:#FCBF49; --sol-deep:#E09F3E;
    --tapete:#0F3D2E; --tapete-deep:#0A2B20; --tinta:#132A24; --line: rgba(251,249,244,0.18);
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; background:linear-gradient(180deg,var(--tapete),var(--tapete-deep)); font-family:'Space Grotesk',sans-serif; color:var(--blanco);}
  .wrap{max-width:560px; margin:0 auto; padding:40px 20px 80px;}
  h1{font-family:'Fraunces',serif; font-weight:900; text-align:center; font-size:clamp(2rem,6vw,2.8rem); margin:0 0 6px;}
  h1 span{color:var(--sol); font-style:italic; font-weight:500;}
  .subt{text-align:center; color:rgba(251,249,244,.7); margin-bottom:30px; font-size:.95rem;}
  .panel{background:rgba(19,42,36,.55); border:1px solid var(--line); border-radius:18px; padding:26px; margin-bottom:20px;}
  .campo{margin-bottom:14px;}
  .campo label{display:block; font-size:.75rem; text-transform:uppercase; letter-spacing:.1em; color:var(--sol); margin-bottom:6px;}
  .campo input, .campo select{width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--line); background:rgba(0,0,0,.22); color:var(--blanco); font-family:inherit; font-size:1rem;}
  .btn{width:100%; font-family:inherit; font-weight:600; font-size:.98rem; padding:13px 20px; border-radius:12px; border:none; cursor:pointer; margin-top:6px;}
  .btn-sol{background:linear-gradient(180deg,#FFDD8C,var(--sol) 55%,var(--sol-deep)); color:var(--tinta);}
  .btn-fantasma{background:transparent; color:var(--blanco); border:1px solid var(--line);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .divisor{text-align:center; color:rgba(251,249,244,.4); font-size:.78rem; text-transform:uppercase; letter-spacing:.15em; margin:22px 0;}
  #pantallaInicio, #pantallaSala, #pantallaError{display:none;}
  .activa{display:block !important;}

  .codigo-sala{
    text-align:center; margin-bottom:22px;
  }
  .codigo-sala .etiqueta{font-size:.75rem; text-transform:uppercase; letter-spacing:.15em; color:rgba(251,249,244,.6); margin-bottom:8px;}
  .codigo-sala .codigo{
    font-family:'Fraunces',serif; font-weight:700; font-size:2.4rem; letter-spacing:.12em;
    color:var(--sol); background:rgba(0,0,0,.25); border-radius:14px; padding:14px 10px;
  }
  .link-invitar{
    display:flex; gap:8px; margin-top:14px;
  }
  .link-invitar input{flex:1; padding:9px 12px; border-radius:10px; border:1px solid var(--line); background:rgba(0,0,0,.22); color:var(--blanco); font-size:.85rem;}
  .link-invitar button{padding:9px 16px; border-radius:10px; border:none; background:var(--celeste); color:var(--tinta); font-weight:600; cursor:pointer;}

  .lista-jugadores{list-style:none; padding:0; margin:0 0 20px;}
  .lista-jugadores li{
    display:flex; align-items:center; gap:10px;
    background:rgba(0,0,0,.2); border:1px solid var(--line); border-radius:10px;
    padding:10px 14px; margin-bottom:8px; font-size:.95rem;
  }
  .lista-jugadores li .punto{width:8px; height:8px; border-radius:50%; background:var(--sol);}
  .lista-jugadores li .vos{margin-left:auto; font-size:.72rem; color:var(--sol); text-transform:uppercase; letter-spacing:.08em;}

  .estado-espera{text-align:center; color:rgba(251,249,244,.6); font-size:.88rem; margin-bottom:16px;}
  .error-txt{color:#F2A29A; text-align:center; margin-bottom:14px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sala<span> online</span></h1>
  <p class="subt">Armá tu mesa e invitá a quien quieras a jugar.</p>

  <div id="pantallaInicio" class="activa">
    <div class="panel">
      <div class="campo">
        <label>Tu nombre</label>
        <input type="text" id="inputNombre" placeholder="¿Cómo te llamás?" maxlength="20">
      </div>
      <div class="campo">
        <label>Puntos para ganar (si vas a crear la mesa)</label>
        <select id="inputObjetivo">
          <option value="15">15</option>
          <option value="30" selected>30</option>
        </select>
      </div>
      <button class="btn btn-sol" id="btnCrear">Crear mesa</button>
    </div>

    <div class="divisor">o</div>

    <div class="panel">
      <div class="campo">
        <label>Código de la mesa</label>
        <input type="text" id="inputCodigo" placeholder="Ej: TR7K9" maxlength="6" style="text-transform:uppercase;">
      </div>
      <button class="btn btn-fantasma" id="btnUnirse">Unirme a la mesa</button>
    </div>
  </div>

  <div id="pantallaSala">
    <div class="panel">
      <div class="codigo-sala">
        <div class="etiqueta">Código de la mesa</div>
        <div class="codigo" id="codigoTexto">-----</div>
        <div class="link-invitar">
          <input type="text" id="linkInvitar" readonly>
          <button id="btnCopiar">Copiar</button>
        </div>
      </div>

      <div class="estado-espera" id="estadoEspera">Esperando jugadores...</div>
      <ul class="lista-jugadores" id="listaJugadores"></ul>

      <button class="btn btn-sol" id="btnIniciar" style="display:none;">Iniciar partida</button>
      <button class="btn btn-fantasma" id="btnSalir">Salir de la mesa</button>
    </div>
  </div>

  <div id="pantallaError" class="panel">
    <p class="error-txt" id="errorTexto">No se encontró la mesa.</p>
    <button class="btn btn-fantasma" id="btnVolver">Volver</button>
  </div>
</div>

<!-- ===================== CONFIGURACIÓN DE FIREBASE =====================
     Pegá acá el objeto firebaseConfig que te dio la consola de Firebase
     (Configuración del proyecto → Tus apps → app Web).
     ====================================================================== -->
     
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, onValue, remove, onDisconnect, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBnAcU20fn3m0LECJAz_zhbrpcrfqlpt50",
    authDomain: "truco-argento-game.firebaseapp.com",
    databaseURL: "https://truco-argento-game-default-rtdb.firebaseio.com",
    projectId: "truco-argento-game",
    storageBucket: "truco-argento-game.firebasestorage.app",
    messagingSenderId: "570580695631",
    appId: "1:570580695631:web:53814805e35e3b95d3c83a",
    measurementId: "G-XKJ8JHQCM0"
  };
  // =======================================================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const $ = id => document.getElementById(id);
  let uid = null;
  let codigoActual = null;
  let salaListener = null;

  function mostrarPantalla(id){
    ['pantallaInicio','pantallaSala','pantallaError'].forEach(p=>$(p).classList.remove('activa'));
    $(id).classList.add('activa');
  }

  onAuthStateChanged(auth, (user)=>{
    if(user){
      uid = user.uid;
      revisarCodigoEnURL();
    }
  });
  signInAnonymously(auth).catch(err=>{
    mostrarPantalla('pantallaError');
    $('errorTexto').textContent = 'No se pudo conectar (revisá la configuración de Firebase). ' + err.message;
  });

  function generarCodigo(){
    const letras = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let c = '';
    for(let i=0;i<5;i++) c += letras[Math.floor(Math.random()*letras.length)];
    return c;
  }

  $('btnCrear').addEventListener('click', async ()=>{
    const nombre = $('inputNombre').value.trim();
    if(!nombre){ alert('Poné tu nombre primero.'); return; }
    if(!uid){ alert('Conectando, esperá un segundo e intentá de nuevo.'); return; }
    const objetivo = parseInt($('inputObjetivo').value,10);
    const codigo = generarCodigo();
    const salaRef = ref(db, 'salas/' + codigo);
    await set(salaRef, {
      creada: Date.now(),
      objetivo: objetivo,
      anfitrion: uid,
      estado: 'esperando',
      jugadores: {
        [uid]: { nombre, orden: 0, unidoEn: Date.now() }
      }
    });
    onDisconnect(ref(db, 'salas/' + codigo + '/jugadores/' + uid)).remove();
    entrarASala(codigo);
  });

  $('btnUnirse').addEventListener('click', async ()=>{
    const nombre = $('inputNombre').value.trim();
    const codigo = $('inputCodigo').value.trim().toUpperCase();
    if(!nombre){ alert('Poné tu nombre primero.'); return; }
    if(!codigo){ alert('Poné el código de la mesa.'); return; }
    if(!uid){ alert('Conectando, esperá un segundo e intentá de nuevo.'); return; }
    await unirseAMesa(codigo, nombre);
  });

  async function unirseAMesa(codigo, nombre){
    const salaRef = ref(db, 'salas/' + codigo);
    const snap = await get(salaRef);
    if(!snap.exists()){
      mostrarPantalla('pantallaError');
      $('errorTexto').textContent = 'No se encontró ninguna mesa con el código ' + codigo + '.';
      return;
    }
    const jugadoresActuales = snap.val().jugadores || {};
    const orden = Object.keys(jugadoresActuales).length;
    await update(ref(db, 'salas/' + codigo + '/jugadores/' + uid), { nombre, orden, unidoEn: Date.now() });
    onDisconnect(ref(db, 'salas/' + codigo + '/jugadores/' + uid)).remove();
    entrarASala(codigo);
  }

  function revisarCodigoEnURL(){
    const params = new URLSearchParams(window.location.search);
    const codigo = params.get('sala');
    if(codigo){
      $('inputCodigo').value = codigo.toUpperCase();
    }
  }

  function entrarASala(codigo){
    codigoActual = codigo;
    mostrarPantalla('pantallaSala');
    $('codigoTexto').textContent = codigo;
    const url = window.location.origin + window.location.pathname + '?sala=' + codigo;
    $('linkInvitar').value = url;

    if(salaListener) salaListener();
    salaListener = onValue(ref(db, 'salas/' + codigo), (snap)=>{
      if(!snap.exists()){
        mostrarPantalla('pantallaError');
        $('errorTexto').textContent = 'La mesa se cerró.';
        return;
      }
      const data = snap.val();
      const jugadores = data.jugadores || {};
      const lista = $('listaJugadores');
      lista.innerHTML = '';
      Object.entries(jugadores)
        .sort((a,b)=>(a[1].orden||0)-(b[1].orden||0))
        .forEach(([id, j])=>{
          const li = document.createElement('li');
          li.innerHTML = `<span class="punto"></span> ${escapeHtml(j.nombre)} ${id===uid ? '<span class="vos">Vos</span>' : ''}`;
          lista.appendChild(li);
        });

      const cantidad = Object.keys(jugadores).length;
      $('estadoEspera').textContent = cantidad < 2
        ? 'Esperando al menos un jugador más...'
        : (data.estado === 'jugando' ? 'La partida ya arrancó.' : '¡Listos para arrancar!');

      const esAnfitrion = data.anfitrion === uid;
      $('btnIniciar').style.display = (esAnfitrion && cantidad>=2 && data.estado!=='jugando') ? 'block' : 'none';
    });
  }

  $('btnIniciar').addEventListener('click', async ()=>{
    await update(ref(db, 'salas/' + codigoActual), { estado: 'jugando' });
    // Acá se conecta el motor de truco en el próximo paso: por ahora solo marca el estado.
    alert('¡La mesa quedó marcada como "jugando"! El próximo paso es conectar el motor de truco a esta sala.');
  });

  $('btnCopiar').addEventListener('click', ()=>{
    $('linkInvitar').select();
    document.execCommand('copy');
    $('btnCopiar').textContent = '¡Copiado!';
    setTimeout(()=>{ $('btnCopiar').textContent = 'Copiar'; }, 1500);
  });

  $('btnSalir').addEventListener('click', async ()=>{
    if(codigoActual && uid){
      await remove(ref(db, 'salas/' + codigoActual + '/jugadores/' + uid));
    }
    if(salaListener) salaListener();
    codigoActual = null;
    mostrarPantalla('pantallaInicio');
  });

  $('btnVolver').addEventListener('click', ()=>{ mostrarPantalla('pantallaInicio'); });

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
</script>
</body>
</html>
